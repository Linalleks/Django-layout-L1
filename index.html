<!DOCTYPE html>
<html>
<head>
  <title>Пример подключения плеера</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="./font-awesome-4.7.0/css/font-awesome.min.css">
  <style type="text/css">
    .player-container {
      width: 800px;
      height: 600px;
    }

    .video-container {
      width: 100%;
      height: 100%;
    }

    .control-panel {
      width: 100%;
      background-color: black;
    }

    .player-button {
      background-color: transparent;
      border-style: none;
      width: 24px;
      height: 18px;
      cursor: pointer;
    }

    .button-icon {
      color: white;
    }
  </style>
</head>
<body>
  <div id="player" class="player-container">
    <div class="js-video-container video-container"></div>
    <div class="control-panel">
      <button class="js-play-button player-button" type="button" name="play-button">
        <i class="fa fa-play button-icon" aria-hidden="true"></i>
      </button>
      <button class="js-pause-button player-button" type="button" name="pause-button" hidden>
        <i class="fa fa-pause button-icon" aria-hidden="true"></i>
      </button>
    </div>
  </div>
  
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
  <script src="player.js"></script>

  <script type="text/javascript">
    createPlayer({elementId: 'player'});
  </script>

</body>
</html>
